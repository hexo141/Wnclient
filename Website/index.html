<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install Wnclient Script</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div>
                <h1 class="title">Install Wnclient Script</h1>
                <p class="subtitle">Ensure Python is installed before running the command below.</p>
            </div>
        </header>

        <div class="status-bar">
            <span class="status-dot"></span>
            <span id="os-info">Detecting System...</span>
        </div>

        <div class="code-block">
            <div class="code-content">
                <span class="prompt">$</span>
                <code class="code-text" id="command-text">Loading command...</code>
            </div>
            <button class="copy-btn" onclick="copyCode(this)" aria-label="Copy command">
                <svg class="icon-copy" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg class="icon-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span class="btn-text">Copy</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
